<div class="dashboard">
  <header class="dashboard-header">
    <div class="brand">
      <h1 class="dashboard-title">TruckDispatch</h1>
      <span>Knowledge-based fleet dispatch</span>
    </div>
    <nav class="tabs">
      <button class="tab-btn" [class.active]="tab === 'dispatch'" (click)="tab = 'dispatch'">Dispatch</button>
      <button class="tab-btn" [class.active]="tab === 'events'" (click)="tab = 'events'">Fleet Events</button>
      <button class="tab-btn" [class.active]="tab === 'alarms'" (click)="tab = 'alarms'">Active Alarms</button>
    </nav>
  </header>

  <main class="dashboard-body">
    @if (tab === 'dispatch') {
      <div class="dispatch-layout">
        <app-dispatch-panel (resultReady)="onResult($event)" />
        @if (result) {
          <app-results-panel [result]="result" />
        } @else {
          <section class="panel empty-results">
            <div class="empty-results-inner">
              <p class="eyebrow">No run yet</p>
              <h2>Results appear here after dispatch processing.</h2>
            </div>
          </section>
        }
      </div>
    }
    @if (tab === 'events') {
      <app-cep-panel />
    }
    @if (tab === 'alarms') {
      <app-alarms-panel />
    }
  </main>
</div>
