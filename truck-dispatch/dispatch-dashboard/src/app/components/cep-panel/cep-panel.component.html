<div class="panel">
  <div class="panel-header">
    <div>
      <p class="eyebrow">Real-time stream</p>
      <h2>Fleet Event (CEP)</h2>
    </div>
  </div>

  <section class="card">
    <div class="section-header">
      <h3>Event payload</h3>
      <p class="section-meta">Submitted to the Drools stream session</p>
    </div>
    <div class="form-row">
      <label>Event Type
        <select [(ngModel)]="event.type">
          @for (t of eventTypes; track t) { <option [value]="t">{{ t }}</option> }
        </select>
      </label>
      <label>Entity ID <input [(ngModel)]="event.entityId" placeholder="e.g. V-05" /></label>
      <label>Value <input type="number" [(ngModel)]="event.value" placeholder="delay min / fuel % / ..." /></label>
      <label>Location <input [(ngModel)]="event.location" placeholder="e.g. Novi Sad" /></label>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" (click)="send()" [disabled]="loading">
        {{ loading ? 'Sending...' : 'Send Event' }}
      </button>
    </div>

    @if (error) {
      <div class="alert-error">{{ error }}</div>
    }
  </section>

  @if (messages.length > 0) {
    <section class="card">
      <div class="section-header">
        <h3>CEP Response</h3>
        <p class="section-meta">{{ messages.length }} messages</p>
      </div>
      <ul class="message-list">
        @for (msg of messages; track $index) {
          <li>{{ msg }}</li>
        }
      </ul>
    </section>
  }
</div>
